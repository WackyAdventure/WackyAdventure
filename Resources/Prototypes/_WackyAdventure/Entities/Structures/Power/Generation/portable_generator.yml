- type: entity
  name: ядерный реактор
  description: Устройство, которое позволяет контролируемо проводить ядерные реакции для получения энергии.
  parent: PortableGeneratorSwitchableBase
  id: PortableGeneratorNuclearUranium
  suffix: Uranium, 100 kW
  components:
    - type: Appearance
    - type: Sprite
      sprite: _WackyAdventure/Structures/Power/Generation/nuckealreactor.rsi
      state: portgenUr
      noRot: true
      layers:
        - state: portgenUr
          map: [ "enum.GeneratorVisualLayers.Body" ]
        - state: portgenUrOn
          map: [ "enum.GeneratorVisualLayers.Unlit" ]
          shader: unshaded
          visible: false
    - type: GenericVisualizer
      visuals:
        enum.GeneratorVisuals.Running:
          enum.GeneratorVisualLayers.Body:
            True: { state: portgenUrOn }
            False: { state: portgenUr }
          enum.GeneratorVisualLayers.Unlit:
            True: { visible: true }
            False: { visible: false }

    - type: Machine
      board: PortableGeneratorSuperPacmanMachineCircuitboard
    - type: FuelGenerator
      minTargetPower: 100000
      maxTargetPower: 100000
      targetPower: 100000
      optimalPower: 100000
      # 30 minutes at full power
      optimalBurnRate: 0.0166666
      # Barely save any fuel from reducing power output
      fuelEfficiencyConstant: 0.001
    - type: SolidFuelGeneratorAdapter
      fuelMaterial: UraniumFuel
      multiplier: 0.02
    - type: MaterialStorage
      storageLimit: 30000
      materialWhiteList: [UraniumFuel]
    - type: PortableGenerator
    - type: PowerMonitoringDevice
      group: Generator
      loadNodes:
        - output_hv
    - type: PowerSupplier
      supplyRampRate: 7500
      supplyRampTolerance: 2500

