- type: entity
  abstract: true
  parent: BaseItem
  id: BaseFuelRod
  name: топливный стержень
  description: Топливный стержень для ядерного реактора.
  components:
  - type: Item
    size: Normal
    sprite: _WackyAdventure/Objects/Power/nuclear.rsi
  - type: Sprite
    sprite: _WackyAdventure/Objects/Power/nuclear.rsi
    state: uraniumFuelRod
  - type: AmeFuelContainer
    powerMultiplier: 2.5 # 300 Kilowatt
    fuelCapacity: 5000
    fuelAmount: 5000
  - type: StaticPrice
    price: 1000
  - type: GuideHelp
    guides: [ AME, Power ]
  - type: Tag
    tags:
    - NuclearFuelRod

