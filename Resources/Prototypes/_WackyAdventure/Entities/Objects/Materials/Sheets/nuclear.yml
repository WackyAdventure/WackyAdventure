- type: entity
  parent: [SheetOtherBase, EdibleBase]
  abstract: true
  id: BaseNuclearMaterial
  name: BaseMaterial
  components:
  - type: Tag
    tags:
    - NuclearMaterial
  - type: RadiationSource
    intensity: 0.05
  - type: Material
  - type: Food
    transferAmount: 10
  - type: BadFood
  - type: PhysicalComposition
    materialComposition:
      Uranium-235: 100
  - type: Stack
    stackType: Uranium-235
    baseLayer: base
    layerStates:
    - uranium-235
    - uranium-235_2
    - uranium-235_3
  - type: Sprite
    sprite: /Textures/_WackyAdventure/Objects/Materials/Sheets/other.rsi
    state: uranium-235_3
    layers:
    - state: uranium-235_3
      map: ["base"]
  - type: Item
  - type: Extractable
    grindableSolutionName: food
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Uranium
          Quantity: 8
        - ReagentId: Radium
          Quantity: 2
        canReact: false

