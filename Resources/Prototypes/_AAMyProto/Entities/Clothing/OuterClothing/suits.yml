- type: entity
  parent: [ ClothingOuterBaseLarge, GeigerCounterClothing, AllowSuitStorageClothing, ClothingOuterBaseToggleable ]
  id: ClothingOuterSuitRadFullDefense
  name: противорадиационный костюм
  suffix: "100%"
  description: "Костюм защищающий на 100% от радиации"
  components:
  - type: Sprite
    sprite: Clothing/OuterClothing/Suits/rad.rsi
  - type: Armor
    coverage:
    - Chest
    - Groin
    - Arm
    - Hand
    - Leg
    - Foot
    - Tail
    - Other
    modifiers:
      coefficients:
        Heat: 0.85
        Radiation: 0
  - type: Clothing
    sprite: Clothing/OuterClothing/Suits/rad.rsi
  - type: GroupExamine
  - type: ToggleableClothing # Goobstation - Modsuits change
    clothingPrototypes:
      head: ClothingHeadHatHoodRad
  - type: ProtectedFromStepTriggers
    slots: WITHOUT_POCKET
  - type: HideClothingLayerClothing # Goobstation
    hiddenSlots:
    - jumpsuit

